name: Add LinkedIn post
on:
  issues:
    types: [opened, edited]
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  add:
    if: contains(github.event.issue.labels.*.name, 'content:linkedin')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run add:linkedin
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: automation/linkedin-${{ github.event.issue.number }}
          delete-branch: true
          commit-message: "chore(content): add curated LinkedIn post"
          title: "chore(content): review LinkedIn post #${{ github.event.issue.number }}"
          body: "Closes #${{ github.event.issue.number }}. Verify excerpt, image rights and both locales before merge."
          labels: content-review,linkedin
