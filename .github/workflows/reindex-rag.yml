name: Reindex RAG
on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"
  push:
    branches: [main]
    paths:
      - "src/content/**"
      - "content/**"
permissions:
  contents: read
jobs:
  index:
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
    steps:
      - name: Integration not configured
        if: ${{ env.SUPABASE_URL == '' || env.SUPABASE_SECRET_KEY == '' }}
        run: echo "RAG indexing is intentionally skipped until Supabase production secrets are configured."
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SECRET_KEY != '' }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SECRET_KEY != '' }}
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SECRET_KEY != '' }}
      - run: npm run ingest:rag
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SECRET_KEY != '' }}
        env:
          EMBEDDING_MODEL: Xenova/multilingual-e5-small
